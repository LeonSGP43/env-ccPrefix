name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      
      - name: Run ShellCheck
        run: shellcheck bin/envp

  posix-compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shell: [dash, bash, sh]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install shells
        run: |
          if [ "${{ matrix.shell }}" = "dash" ]; then
            sudo apt-get install -y dash
          fi
      
      - name: Test with ${{ matrix.shell }}
        run: |
          ${{ matrix.shell }} bin/envp echo "test"

  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup test environment
        run: |
          mkdir -p ~/.env-prefix
          cat > ~/.env-prefix/default.env << 'EOF'
          export TEST_VAR="hello"
          EOF
          
          cat > ~/.env-prefix/test.env << 'EOF'
          export TEST_VAR="world"
          export ENV_PREFIX_REQUIRED="TEST_VAR"
          EOF

          cat > ~/.env-prefix/model1.env << 'EOF'
          export TEST_VAR="model1"
          EOF
      
      - name: Test basic execution
        run: |
          result=$(bin/envp sh -c 'echo $TEST_VAR')
          [ "$result" = "hello" ] || exit 1
      
      - name: Test multi-env support
        run: |
          result=$(bin/envp --env=test sh -c 'echo $TEST_VAR')
          [ "$result" = "world" ] || exit 1
      
      - name: Test required vars validation
        run: |
          unset TEST_VAR
          if bin/envp --env=test sh -c 'echo ok' 2>/dev/null; then
            echo "Should have failed on missing required var"
            exit 1
          fi
          echo "Correctly rejected missing required var"
      
      - name: Test command preservation
        run: |
          bin/envp echo "arg with spaces" | grep "arg with spaces"

      - name: Test argv0 profile prefix
        run: |
          ln -s "$PWD/bin/envp" bin/model1
          result=$(bin/model1 sh -c 'echo $TEST_VAR')
          [ "$result" = "model1" ] || exit 1
